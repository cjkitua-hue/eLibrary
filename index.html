<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Virtual Library</title>
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js"></script>
</head>
<body>
    
    <div id="library-view">
        <header class="library-header">
            <h1>The Grand Hall</h1>
            <div class="controls">
                <button id="toggle-intake-btn">+ Add New Book</button>
                <button id="theme-toggle">Toggle Midnight Archive</button>
            </div>
        </header>

        <section id="intake-panel" class="hidden-panel">
            <h3>Acquire New Volume</h3>
                <form id="add-book-form">
                <input type="text" id="new-title" placeholder="Book Title" required>
                <input type="text" id="new-author" placeholder="Author Name" required>
    
                <label for="new-book-file">Upload Book File (EPUB or PDF)</label>
                <input type="file" id="new-book-file" accept=".epub, application/pdf" required>
    
                <label for="new-cover-file">Upload Cover Image (Optional)</label>
            <input type="file" id="new-cover-file" accept="image/png, image/jpeg, image/webp">
    
    <select id="shelf-select" required>
        <option value="">Select a Shelf...</option>
    </select>
    
    <button type="submit" id="catalog-submit-btn">Catalog Book</button>
</form>
        </section>

        <main id="wings-container" class="wings-grid"></main>
    </div>

    <div id="reading-room" class="hidden">
        <header class="reader-header">
            <button id="close-reader">◀ Back to Grand Hall</button>
            <h2 id="reader-book-title">Book Title</h2>
        </header>
        <div class="reader-workspace">
            <button id="prev-page" class="nav-btn">◀</button>
            <div id="viewer"></div>
            <button id="next-page" class="nav-btn">▶</button>
            <aside class="margin-notes-panel">
                <h3>Margin Notes</h3>
                <div id="notes-list"></div>
                <div class="note-input-area">
                    <textarea id="note-text" placeholder="Jot down a thought..."></textarea>
                    <button id="save-note-btn">Attach Note</button>
                </div>
            </aside>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
